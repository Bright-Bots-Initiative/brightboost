name: BrightBoost CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  CYPRESS_BASE_URL: http://localhost:5173

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Typecheck backend
        run: cd backend && npm run typecheck

      - name: Check Prisma schema drift
        run: bash scripts/check-prisma-drift.sh

      - name: Install Cypress dependencies
        run: sudo apt-get update && sudo apt-get install -y libxss1

      - name: Install Cypress binary
        run: npx cypress install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm test -- --watch=false

      - name: Start development server
        run: npm run dev &

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:5173 --timeout 60000

      - name: Run Cypress smoke tests
        run: npx cypress run --spec "cypress/e2e/smoke.cy.ts"

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: dist/

  db-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: brightboost_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        env:
          POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/brightboost_test

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/brightboost_test

      - name: Run database connectivity test
        run: npm run test:db
        env:
          POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/brightboost_test

  # ─────────────────────────────────────────────────────────────────────────
  # LEGACY: The build-docker-image and deploy-to-azure jobs below have been
  # removed. Production now deploys to Railway via auto-deploy from main.
  # See DEPLOYMENT.md for the current production path.
  # ─────────────────────────────────────────────────────────────────────────
