# LEGACY WORKFLOW — This was originally for Azure Static Web Apps.
# Production is now on Railway. The trigger workflow no longer exists,
# so this workflow will not run automatically.
#
# To run a production smoke test against Railway, use workflow_dispatch
# or update the trigger to match the current deploy process.

name: Production Smoke Test

on:
  workflow_dispatch: {}

env:
  # Railway production URL (replaces former Azure SWA URL)
  PROD_URL: https://fe-production-3552.up.railway.app

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Test Frontend
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.PROD_URL }}/")
          echo "Frontend: HTTP $response"
          [ "$response" = "200" ] || exit 1

      - name: Test API Health
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.PROD_URL }}/api/login" -X POST -H "Content-Type: application/json" -d '{}')
          echo "API: HTTP $response"
          # 400 = validation error = API is responding
          [ "$response" = "400" ] || [ "$response" = "401" ] || exit 1

      - name: Summary
        run: |
          echo "Production smoke tests passed"
          echo "Frontend: ${{ env.PROD_URL }}"
          echo "API: ${{ env.PROD_URL }}/api/"
